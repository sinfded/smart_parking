services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  gateway:
    build: ./gateway
    restart: unless-stopped
    env_file: ./gateway/.env
    depends_on:
      - mosquitto
    network_mode: host   # needs local network access to cameras + MQTT

volumes:
  mosquitto-data:
  mosquitto-log:
